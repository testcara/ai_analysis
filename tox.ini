[tox]
envlist = py311,py312,py313,lint,type
skipsdist = False
isolated_build = True

[testenv]
description = Run unit tests (excluding integration tests)
deps =
    pytest>=7.0
    pytest-cov>=4.0
    -r{toxinidir}/requirements.txt
commands =
    pytest --ignore=tests/test_integration.py {posargs}

[testenv:lint]
description = Run code quality checks (flake8, black)
deps =
    flake8>=6.0
    black>=23.0
commands =
    flake8 ai_analysis bin tests
    black --check ai_analysis bin tests

[testenv:type]
description = Run type checking with mypy
deps =
    mypy>=1.0
    types-requests
    -r{toxinidir}/requirements.txt
commands =
    mypy ai_analysis bin

[testenv:format]
description = Auto-format code with black
deps =
    black>=23.0
commands =
    black ai_analysis bin tests

[testenv:coverage]
description = Run tests with coverage report
deps =
    pytest>=7.0
    pytest-cov>=4.0
    -r{toxinidir}/requirements.txt
commands =
    pytest --ignore=tests/test_integration.py --cov=ai_analysis --cov-report=html --cov-report=term-missing {posargs}

[testenv:integration]
description = Run integration tests with real Jira (requires env vars)
passenv = JIRA_URL,JIRA_API_TOKEN,JIRA_PROJECT_KEY,JIRA_USER_EMAIL
deps =
    pytest>=7.0
    -r{toxinidir}/requirements.txt
commands =
    pytest tests/test_integration.py -v {posargs}

[flake8]
max-line-length = 100
extend-ignore = E203, E501, W503
exclude =
    .git,
    .tox,
    build,
    dist,
    venv,
    __pycache__,
    *.egg-info

[pytest]
minversion = 7.0
addopts = -ra -q --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
